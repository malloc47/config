name: Check
on:
  pull_request:
  push:
    branches: [master]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - run: nix fmt -- --ci

  eval-nixos:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [salome, aida, attila, vm-iso]
    steps:
      - uses: actions/checkout@v4
      - name: Create stub SSH keys for eval
        run: |
          mkdir -p personal/ssh/malloc47
          ssh-keygen -t ed25519 -f personal/ssh/malloc47/id_ed25519 -N "" -q
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-platforms = aarch64-linux
      - run: nix eval .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel.drvPath

  eval-darwin:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        host: [cesare, nylmd-jwaggon1]
    steps:
      - uses: actions/checkout@v4
      - name: Create stub SSH keys for eval
        run: |
          mkdir -p personal/ssh/malloc47 personal/ssh/drw
          ssh-keygen -t ed25519 -f personal/ssh/malloc47/id_ed25519 -N "" -q
          ssh-keygen -t ed25519 -f personal/ssh/drw/id_ed25519 -N "" -q
      - uses: cachix/install-nix-action@v30
      - run: nix eval .#darwinConfigurations.${{ matrix.host }}.system
