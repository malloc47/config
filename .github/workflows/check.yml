name: Check
on:
  pull_request:
  push:
    branches: [master]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stub private submodule
        run: |
          stub=$(mktemp -d)
          mkdir -p "$stub/ssh/malloc47"
          ssh-keygen -t ed25519 -f "$stub/ssh/malloc47/id_ed25519" -N "" -q
          git -C "$stub" init -b main
          git -C "$stub" add .
          git -C "$stub" -c user.name=CI -c user.email=ci@localhost commit -m "stub"
          git config --file .gitmodules submodule.personal.url "$stub"
          git submodule sync personal
          git submodule update --init --remote personal
      - uses: cachix/install-nix-action@v30
        with:
          install_url: https://releases.nixos.org/nix/nix-2.31.2/install
      - run: nix fmt -- --ci

  eval-nixos:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [salome, aida, attila, vm-iso]
    steps:
      - uses: actions/checkout@v4
      - name: Stub private submodule
        run: |
          stub=$(mktemp -d)
          mkdir -p "$stub/ssh/malloc47"
          ssh-keygen -t ed25519 -f "$stub/ssh/malloc47/id_ed25519" -N "" -q
          git -C "$stub" init -b main
          git -C "$stub" add .
          git -C "$stub" -c user.name=CI -c user.email=ci@localhost commit -m "stub"
          git config --file .gitmodules submodule.personal.url "$stub"
          git submodule sync personal
          git submodule update --init --remote personal
      - uses: cachix/install-nix-action@v30
        with:
          install_url: https://releases.nixos.org/nix/nix-2.31.2/install
          extra_nix_config: |
            extra-platforms = aarch64-linux
      - run: nix eval .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel.drvPath

  eval-darwin:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        host: [cesare, nylmd-jwaggon1]
    steps:
      - uses: actions/checkout@v4
      - name: Stub private submodule
        run: |
          stub=$(mktemp -d)
          mkdir -p "$stub/ssh/malloc47" "$stub/ssh/drw"
          ssh-keygen -t ed25519 -f "$stub/ssh/malloc47/id_ed25519" -N "" -q
          ssh-keygen -t ed25519 -f "$stub/ssh/drw/id_ed25519" -N "" -q
          git -C "$stub" init -b main
          git -C "$stub" add .
          git -C "$stub" -c user.name=CI -c user.email=ci@localhost commit -m "stub"
          git config --file .gitmodules submodule.personal.url "$stub"
          git submodule sync personal
          git submodule update --init --remote personal
      - uses: cachix/install-nix-action@v30
        with:
          install_url: https://releases.nixos.org/nix/nix-2.31.2/install
      - run: nix eval .#darwinConfigurations.${{ matrix.host }}.system
