name: Check
on:
  pull_request:
  push:
    branches: [master]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v30
        with:
          install_url: https://releases.nixos.org/nix/nix-2.31.2/install
      - run: nix fmt -- --ci

  eval-nixos:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [salome, aida, attila, vm-iso]
    steps:
      - uses: actions/checkout@v5
      - name: Create personal stub
        run: |
          stub=$(realpath "$(mktemp -d)")
          mkdir -p "$stub/ssh/malloc47"
          ssh-keygen -t ed25519 -f "$stub/ssh/malloc47/id_ed25519" -N "" -q
          echo "PERSONAL_STUB=$stub" >> "$GITHUB_ENV"
      - uses: cachix/install-nix-action@v30
        with:
          install_url: https://releases.nixos.org/nix/nix-2.31.2/install
          extra_nix_config: |
            extra-platforms = aarch64-linux
      - run: nix eval --override-input personal "path:$PERSONAL_STUB" '.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel.drvPath'

  eval-darwin:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        host: [cesare]
    steps:
      - uses: actions/checkout@v5
      - name: Create personal stub
        run: |
          stub=$(realpath "$(mktemp -d)")
          mkdir -p "$stub/ssh/malloc47"
          ssh-keygen -t ed25519 -f "$stub/ssh/malloc47/id_ed25519" -N "" -q
          echo "PERSONAL_STUB=$stub" >> "$GITHUB_ENV"
      - uses: cachix/install-nix-action@v30
        with:
          install_url: https://releases.nixos.org/nix/nix-2.31.2/install
      - run: nix eval --override-input personal "path:$PERSONAL_STUB" '.#darwinConfigurations.${{ matrix.host }}.system'
